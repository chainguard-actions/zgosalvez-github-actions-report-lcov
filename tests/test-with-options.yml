name: Test LCOV reporting with optional inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lcov
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lcov

      - name: Create source directory and LCOV coverage file
        run: |
          mkdir -p "$GITHUB_WORKSPACE/myproject/src"
          printf 'function hello() { return "hello"; }\n' > "$GITHUB_WORKSPACE/myproject/src/index.js"
          mkdir -p "$GITHUB_WORKSPACE/myproject/coverage"
          printf 'TN:\nSF:src/index.js\nFN:1,hello\nFNDA:1,hello\nFNF:1\nFNH:1\nDA:1,1\nLF:1\nLH:1\nend_of_record\n' \
            > "$GITHUB_WORKSPACE/myproject/coverage/lcov.info"

      - id: action
        uses: .
        with:
          coverage-files: ${{ github.workspace }}/myproject/coverage/lcov.info
          minimum-coverage: 0
          working-directory: ${{ github.workspace }}/myproject
          title-prefix: "MyProject "
          additional-message: "Coverage report generated by tests."

      - name: Assert total-coverage output is set
        env:
          TOTAL_COVERAGE: ${{ steps.action.outputs.total-coverage }}
        run: |
          echo "total-coverage: $TOTAL_COVERAGE"
          if [ -z "$TOTAL_COVERAGE" ]; then
            echo "FAIL: expected total-coverage to be non-empty"
            exit 1
          fi
          echo "PASS"

      - name: Assert coverage is 100 percent
        env:
          TOTAL_COVERAGE: ${{ steps.action.outputs.total-coverage }}
        run: |
          echo "total-coverage: $TOTAL_COVERAGE"
          if [ "$TOTAL_COVERAGE" != "100" ]; then
            echo "FAIL: expected 100% coverage for fully covered file, got: $TOTAL_COVERAGE"
            exit 1
          fi
          echo "PASS"
