name: Test minimum coverage threshold pass
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lcov
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lcov

      - name: Create LCOV coverage file with 100% line coverage
        run: |
          mkdir -p coverage
          cat > coverage/lcov.info << 'EOF'
          TN:
          SF:src/index.js
          FN:1,main
          FNDA:1,main
          FNF:1
          FNH:1
          DA:1,1
          DA:2,1
          DA:3,1
          DA:4,1
          LF:4
          LH:4
          BRF:0
          BRH:0
          end_of_record
          EOF

      - id: action
        uses: .
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 75
          genhtml-ignore-errors: source

      - name: Assert total-coverage output is set and meets minimum
        env:
          ACTUAL: ${{ steps.action.outputs.total-coverage }}
        run: |
          echo "actual total-coverage: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected total-coverage to be non-empty"
            exit 1
          fi
          # Coverage should be 100 (4/4 lines hit)
          if [ "$ACTUAL" != "100" ]; then
            echo "FAIL: expected total-coverage to be 100, got $ACTUAL"
            exit 1
          fi
          echo "PASS: total-coverage=$ACTUAL meets minimum of 75"
