name: Test basic LCOV coverage reporting
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lcov

      - name: Create source files and LCOV coverage file
        run: |
          mkdir -p "$GITHUB_WORKSPACE/src"
          printf 'function main() {\n  return 1;\n}\n' > "$GITHUB_WORKSPACE/src/index.js"
          mkdir -p "$GITHUB_WORKSPACE/coverage"
          printf 'TN:\nSF:src/index.js\nFN:1,main\nFNDA:1,main\nFNF:1\nFNH:1\nDA:1,1\nDA:2,1\nDA:3,1\nLF:3\nLH:3\nend_of_record\n' \
            > "$GITHUB_WORKSPACE/coverage/lcov.info"

      - id: action
        uses: .
        with:
          coverage-files: ${{ github.workspace }}/coverage/lcov.info
          minimum-coverage: 0

      - name: Assert total-coverage output is set
        env:
          TOTAL_COVERAGE: ${{ steps.action.outputs.total-coverage }}
        run: |
          echo "total-coverage: $TOTAL_COVERAGE"
          if [ -z "$TOTAL_COVERAGE" ]; then
            echo "FAIL: expected total-coverage to be non-empty"
            exit 1
          fi
          echo "PASS"
