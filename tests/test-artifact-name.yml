name: Test LCOV reporting with artifact-name input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lcov
        run: |
          sudo apt-get update -y
          sudo apt-get install -y lcov

      - name: Create source files and LCOV coverage file
        run: |
          mkdir -p "$GITHUB_WORKSPACE/myproject/src"
          echo "function main() { return 1; }" > "$GITHUB_WORKSPACE/myproject/src/main.js"
          mkdir -p "$GITHUB_WORKSPACE/coverage"
          printf 'TN:\nSF:src/main.js\nFN:1,main\nFNDA:1,main\nFNF:1\nFNH:1\nDA:1,1\nDA:2,1\nDA:3,1\nDA:4,0\nLF:4\nLH:3\nend_of_record\n' > "$GITHUB_WORKSPACE/coverage/lcov.info"

      - id: action
        uses: .
        with:
          coverage-files: ${{ github.workspace }}/coverage/lcov.info
          minimum-coverage: 0
          working-directory: ${{ github.workspace }}/myproject
          genhtml-ignore-errors: source
          artifact-name: code-coverage-report

      - name: Assert total-coverage output is set
        env:
          ACTUAL: ${{ steps.action.outputs.total-coverage }}
        run: |
          echo "actual total-coverage: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected total-coverage output to be non-empty"
            exit 1
          fi
          echo "PASS: total-coverage=$ACTUAL"
