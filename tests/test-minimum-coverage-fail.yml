name: Test minimum coverage threshold failure
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lcov
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lcov

      - name: Create source files and LCOV coverage file with partial coverage
        run: |
          mkdir -p "$GITHUB_WORKSPACE/src"
          printf 'function main() {\n  if (true) {\n    return 1;\n  }\n  return 0;\n}\n' > "$GITHUB_WORKSPACE/src/index.js"
          mkdir -p "$GITHUB_WORKSPACE/coverage"
          printf 'TN:\nSF:src/index.js\nFN:1,main\nFNDA:1,main\nFNF:1\nFNH:1\nDA:1,1\nDA:2,1\nDA:3,0\nDA:4,0\nLF:4\nLH:2\nend_of_record\n' \
            > "$GITHUB_WORKSPACE/coverage/lcov.info"

      - name: Run action expecting failure due to low coverage
        id: action
        uses: .
        with:
          coverage-files: ${{ github.workspace }}/coverage/lcov.info
          minimum-coverage: 100
        continue-on-error: true

      - name: Assert action failed due to insufficient coverage
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when coverage is below minimum"
            exit 1
          fi
          echo "PASS"
