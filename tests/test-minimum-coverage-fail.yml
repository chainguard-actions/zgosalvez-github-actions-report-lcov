name: Test minimum coverage threshold fail
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lcov
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lcov

      - name: Create LCOV coverage file with low coverage
        run: |
          mkdir -p coverage
          cat > coverage/lcov.info << 'EOF'
          TN:
          SF:src/index.js
          FN:1,main
          FNDA:1,main
          FNF:1
          FNH:1
          DA:1,1
          DA:2,0
          DA:3,0
          DA:4,0
          LF:4
          LH:1
          BRF:0
          BRH:0
          end_of_record
          EOF

      - id: action
        uses: .
        continue-on-error: true
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 90
          genhtml-ignore-errors: source

      - name: Assert action failed due to low coverage
        env:
          OUTCOME: ${{ steps.action.outcome }}
          ACTUAL: ${{ steps.action.outputs.total-coverage }}
        run: |
          echo "outcome: $OUTCOME"
          echo "actual total-coverage: $ACTUAL"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when coverage ($ACTUAL%) is below minimum (90%)"
            exit 1
          fi
          echo "PASS: action correctly failed when coverage was below minimum"
