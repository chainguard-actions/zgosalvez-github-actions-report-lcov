name: Test minimum coverage threshold failure
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lcov
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lcov

      - name: Create LCOV coverage file with 0% line coverage
        run: |
          mkdir -p coverage
          printf 'TN:\nSF:src/index.js\nFN:1,main\nFNDA:0,main\nFNF:1\nFNH:0\nBRDA:1,0,0,0\nBRDA:1,0,1,0\nBRF:2\nBRH:0\nDA:1,0\nDA:2,0\nDA:3,0\nLF:3\nLH:0\nend_of_record\n' > coverage/lcov.info

      - id: action
        uses: .
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 100
          genhtml-ignore-errors: source
        continue-on-error: true

      - name: Assert action failed due to low coverage
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when coverage is below minimum"
            exit 1
          fi
          echo "PASS: action correctly failed when coverage was below minimum"
