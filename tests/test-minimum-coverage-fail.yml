name: Test minimum coverage threshold fail
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lcov tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lcov

      - name: Create LCOV coverage file with low coverage
        run: |
          mkdir -p /tmp/coverage
          printf 'TN:\nSF:src/index.js\nFN:1,main\nFNDA:1,main\nFNF:1\nFNH:1\nDA:1,1\nDA:2,0\nDA:3,0\nDA:4,0\nLF:4\nLH:1\nend_of_record\n' > /tmp/coverage/lcov.info

      - id: action
        uses: .
        continue-on-error: true
        with:
          coverage-files: /tmp/coverage/lcov.info
          minimum-coverage: 90
          genhtml-ignore-errors: source

      - name: Assert action failed due to low coverage
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when coverage is below minimum, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed when coverage was below minimum threshold"
