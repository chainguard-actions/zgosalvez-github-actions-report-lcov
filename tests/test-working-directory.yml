name: Test working-directory input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lcov tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lcov

      - name: Create source files and LCOV coverage file
        run: |
          mkdir -p /tmp/myproject/src
          echo "function main() { return 1; }" > /tmp/myproject/src/index.js
          mkdir -p /tmp/coverage
          printf 'TN:\nSF:src/index.js\nFN:1,main\nFNDA:1,main\nFNF:1\nFNH:1\nDA:1,1\nLF:1\nLH:1\nend_of_record\n' > /tmp/coverage/lcov.info

      - id: action
        uses: .
        with:
          coverage-files: /tmp/coverage/lcov.info
          working-directory: /tmp/myproject
          minimum-coverage: 0
          genhtml-ignore-errors: source

      - name: Assert total-coverage output is set
        env:
          ACTUAL: ${{ steps.action.outputs.total-coverage }}
        run: |
          echo "actual total-coverage: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: total-coverage output was empty"
            exit 1
          fi
          echo "PASS: total-coverage=$ACTUAL with custom working-directory"
