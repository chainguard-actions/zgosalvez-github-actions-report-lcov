name: Test optional inputs (title-prefix, additional-message, artifact-name, github-token)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install lcov
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lcov

      - name: Create LCOV coverage file
        run: |
          mkdir -p coverage
          cat > coverage/lcov.info << 'EOF'
          TN:
          SF:src/index.js
          FN:1,main
          FNDA:1,main
          FNF:1
          FNH:1
          DA:1,1
          DA:2,1
          DA:3,1
          DA:4,1
          LF:4
          LH:4
          BRF:0
          BRH:0
          end_of_record
          EOF

      - id: action
        uses: .
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 0
          genhtml-ignore-errors: source
          title-prefix: "MyProject "
          additional-message: "Generated by CI pipeline"
          artifact-name: code-coverage-report
          github-token: ""

      - name: Assert total-coverage output is set
        env:
          ACTUAL: ${{ steps.action.outputs.total-coverage }}
        run: |
          echo "actual total-coverage: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected total-coverage to be non-empty"
            exit 1
          fi
          echo "PASS: total-coverage=$ACTUAL"
